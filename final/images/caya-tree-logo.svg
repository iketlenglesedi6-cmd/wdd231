  <!-- Rule -->
  <line x1="58" y1="253" x2="222" y2="253" stroke="#daa38f" stroke-width="0.5" opacity="0.4"/>
  <circle cx="140" cy="253" r="2.2" fill="#daa38f" opacity="0.65"/>
  <circle cx="62" cy="253" r="1.3" fill="#9b7d61" opacity="0.35"/>
