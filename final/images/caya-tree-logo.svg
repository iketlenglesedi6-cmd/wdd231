<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 300" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Come As You Are — Tree of Life Logo</title>
  <desc id="logoDesc">A sacred tree of life logo with an ornamental ring, olive-toned leaves, warm fruit, deep roots, and elegant serif wordmark.</desc>

